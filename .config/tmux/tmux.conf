# tmuxを256色表示できるようにする (true color対応)
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# prefixキーをC-tに変更
set -g prefix C-t

# C-bのキーバインドを解除
unbind C-b

# ステータスバーをボトムに配置
set-option -g status-position bottom

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# | でペインを縦分割する
bind | split-window -h

# - でペインを横分割する
bind - split-window -v

# 番号基準値を変更
set-option -g base-index 1

# ウィンドウ名をカレントディレクトリ名に自動設定
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# ターミナルウィンドウタイトルにセッション名を表示
set-option -g set-titles on
set-option -g set-titles-string '#S: #{b:pane_current_path}'

# マウス操作を有効にする
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# コピーモードを設定する
## viのキーバインドを使用
setw -g mode-keys vi

# macOS clipboard integration
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# popup でghq/gwq呼び出し（tmux 3.2+）
# スタンドアロンスクリプトで直接実行（zsh -ic の ~1.7s 起動コストを回避）
bind g display-popup -w 90% -h 90% -E "$HOME/.config/shell/bin/ghq-tmux-popup"
bind w display-popup -w 90% -h 90% -E "$HOME/.config/shell/bin/gwq-tmux-popup"
bind t choose-tree -Zs
bind s display-popup -w 90% -h 90% -E "$HOME/.config/shell/bin/tmux-session-fzf-popup"

# Pokemon (新セッション作成時にランダム表示)
set-hook -g session-created 'run-shell "/opt/homebrew/bin/pokemon-go-colorscripts -r -s"'

# ===========================================
# Plugins (TPM)
# ===========================================

# Catppuccin theme (Ghosttyと統一)
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# tmux-battery (Catppuccin のバッテリーモジュールに必要)
set -g @plugin 'tmux-plugins/tmux-battery'

# tmux-cpu (CPU/メモリ使用率表示)
set -g @plugin 'tmux-plugins/tmux-cpu'

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'

# Catppuccin battery モジュール設定
# 充電中: ⚡ / 放電中: 🔋
set -g @catppuccin_battery_icon "#(pmset -g batt | grep -q 'AC Power' && echo '⚡' || echo '🔋') "
set -g @catppuccin_battery_text " #(~/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh)"

# Catppuccin テーマをロード (status module 設定の前に必要)
# PATH を設定して /usr/bin/env bash が動作するようにする
run-shell "if [ -f ~/.tmux/plugins/tmux/catppuccin.tmux ]; then PATH=/opt/homebrew/bin:$PATH ~/.tmux/plugins/tmux/catppuccin.tmux; fi"

# Catppuccin ステータスモジュールをロード
source-file ~/.tmux/plugins/tmux/status/session.conf
source-file ~/.tmux/plugins/tmux/status/battery.conf
source-file ~/.tmux/plugins/tmux/status/date_time.conf

# Status line 設定 (Catppuccin v2 形式)
set -g status-right-length 150
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ga status-right "#[bg=#313244]#(/opt/homebrew/bin/gitmux -cfg ~/.config/gitmux/config.yml '#{pane_current_path}') "
set -ga status-right "#[bg=#313244,fg=#89b4fa] C:#(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#a6e3a1]M:#(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) "
set -ga status-right "#{E:@catppuccin_status_battery}"
set -ga status-right "#{E:@catppuccin_status_date_time}"

# TPMを最後に実行
run-shell "PATH=/opt/homebrew/bin:$PATH $HOME/.tmux/plugins/tpm/tpm"
